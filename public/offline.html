<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تسيير - غير متصل / Hors ligne</title>
    <link rel="stylesheet" href="assets/css/app.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="offline-body" style="background-color: #f8fafc; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; direction: rtl;">
    <div class="card offline-card" style="background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 450px; border: 1px solid rgba(0,0,0,0.03);">
        <div style="width: 72px; height: 72px; background: rgba(239, 68, 68, 0.08); color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <i class="fa-solid fa-wifi-slash" style="font-size: 2rem;"></i>
        </div>
        <h3 style="color: #1e293b; font-weight: 800; margin-bottom: 0.5rem;">أنت غير متصل بالإنترنت</h3>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem;">يرجى التحقق من اتصالك بالشبكة والمحاولة مرة أخرى.</p>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0;">
        <h3 style="color: #1e293b; font-weight: 800; margin-bottom: 0.5rem;">Vous êtes hors ligne</h3>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">Veuillez vérifier votre connexion réseau et réessayer.</p>
        <button onclick="window.location.reload()" style="background: linear-gradient(135deg, #003870 0%, #0284c7 100%); border: none; color: white; padding: 0.75rem 2rem; border-radius: 50px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: 'Cairo'; box-shadow: 0 4px 15px rgba(0, 56, 112, 0.15); transition: transform 0.2s;">
            <i class="fa-solid fa-arrows-rotate"></i> إعادة المحاولة / Réessayer
        </button>
    </div>
</body>
</html>
