    <!-- Honeycomb hex security background texture -->
    <defs>
        <pattern id="honeycomb" width="24" height="42" patternUnits="userSpaceOnUse" patternTransform="scale(0.35)">
            <path d="M12 0 L24 7 L24 21 L12 28 L0 21 L0 7 Z" fill="none" stroke="rgba(30, 58, 138, 0.015)" stroke-width="0.4"/>
